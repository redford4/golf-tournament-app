name: Deploy to GitHub Pages

# Auto-deploys the app whenever you push to the main branch.
# The site is the contents of the golf-app/ folder.

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload the app (golf-app folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./golf-app

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
